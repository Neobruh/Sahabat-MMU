{% if username %}
<div id="fbShell" data-me="{{ username }}"></div>

<style>
#fbLaunch{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:#0084ff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.35);padding:0}
#fbLaunch:hover{background:#006fd6}
#fbLaunch i{font-size:22px;pointer-events:none}
#fbBadge{position:absolute;top:-3px;right:-3px;background:#e24b4a;color:#fff;font-size:11px;border-radius:10px;min-width:18px;height:18px;padding:0 4px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;font-weight:600;pointer-events:none}
#fbDropup{position:fixed;bottom:78px;right:20px;width:300px;background:#fff;border:1px solid #ccc;border-radius:10px;z-index:9998;flex-direction:column;max-height:420px;box-shadow:0 4px 16px rgba(0,0,0,.2);overflow:hidden;display:none}
.fb-dup-head{padding:12px 14px 8px;font-size:17px;font-weight:700;color:#050505;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.fb-dup-search{padding:0 10px 8px;flex-shrink:0}
.fb-dup-search input{width:100%;background:#f0f2f5;border:none;border-radius:20px;padding:7px 14px;font-size:14px;outline:none;color:#050505}
.fb-dup-search input::placeholder{color:#8a8d91}
.fb-dup-list{overflow-y:auto;flex:1}
.fb-frow{display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.fb-frow:hover{background:#f0f2f5}
.fb-frow-pic-wrap{position:relative;flex-shrink:0;pointer-events:none}
.fb-frow-pic{width:38px;height:38px;border-radius:50%;object-fit:cover;display:block;background:#ccc}
.fb-frow-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#31a24c;border:2px solid #fff}
.fb-frow-name{font-size:14px;font-weight:500;color:#050505;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.fb-frow-pill{background:#0084ff;color:#fff;font-size:11px;border-radius:10px;min-width:18px;height:18px;padding:0 5px;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;pointer-events:none}
.fb-dup-empty{font-size:13px;color:#8a8d91;text-align:center;padding:20px}
.fb-icon-btn{background:none;border:none;cursor:pointer;color:#65676b;padding:6px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.fb-icon-btn:hover{background:#f0f2f5}
#fbWins{position:fixed;bottom:0;right:78px;display:flex;align-items:flex-end;gap:8px;z-index:9997}
.fb-win{width:280px;border-radius:8px 8px 0 0;background:#fff;border:1px solid #ccc;border-bottom:none;display:flex;flex-direction:column;overflow:hidden;height:370px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.fb-win.fb-minimized{height:36px}
.fb-whead{background:#fff;padding:6px 8px;display:flex;align-items:center;gap:7px;flex-shrink:0;border-bottom:1px solid #e4e4e4;cursor:pointer;min-height:36px;user-select:none}
.fb-whead img{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#ccc;pointer-events:none}
.fb-whead-name{flex:1;font-size:13px;font-weight:700;color:#050505;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none;pointer-events:none}
.fb-whead-btn{background:none;border:none;cursor:pointer;color:#65676b;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1}
.fb-whead-btn:hover{background:#f0f2f5}
.fb-wbody{flex:1;overflow-y:auto;padding:8px 8px 4px;display:flex;flex-direction:column;gap:2px;background:#fff}
.fb-row{display:flex;align-items:flex-end;gap:5px;margin-top:2px}
.fb-row-mine{flex-direction:row-reverse}
.fb-row-pic{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#ccc}
.fb-row-pic.fb-pic-hidden{visibility:hidden}
.fb-col{display:flex;flex-direction:column;gap:2px;max-width:78%}
.fb-row-mine .fb-col{align-items:flex-end}
.fb-bubble{padding:6px 10px;border-radius:18px;font-size:13px;line-height:1.4;word-break:break-word;display:inline-block}
.fb-bubble-mine{background:#0084ff;color:#fff;border-bottom-right-radius:4px}
.fb-bubble-theirs{background:#f0f2f5;color:#050505;border-bottom-left-radius:4px}
.fb-msg-time{font-size:10px;color:#8a8d91;padding:0 4px;margin-top:1px}
.fb-wfoot{padding:6px 8px;display:flex;align-items:center;gap:5px;flex-shrink:0;border-top:1px solid #e4e4e4}
.fb-winput{flex:1;background:#f0f2f5;border:none;border-radius:20px;padding:6px 12px;font-size:13px;outline:none;color:#050505}
.fb-winput::placeholder{color:#8a8d91}
.fb-wsend{background:none;border:none;color:#0084ff;cursor:pointer;padding:5px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fb-wsend:hover{background:#f0f2f5}
.fb-pulse{animation:fbpulse .45s ease}
@keyframes fbpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
</style>

<script src="https://cdn.jsdelivr.net/npm/socket.io@4.7.5/client-dist/socket.io.min.js"></script>
<script>
(function(){
    const ME = document.getElementById("fbShell").dataset.me;
    const socket = io();

    let allFriends = [], friends = [], openChats = {}, unreadCounts = {};

    // ── Build all UI nodes and attach to body ──────────────────────────
    function injectUI() {
        // Launcher
        const btn = document.createElement("button");
        btn.id = "fbLaunch";
        btn.setAttribute("aria-label","Open messages");
        btn.innerHTML = `<i class="ti ti-message-circle"></i><span id="fbBadge" style="display:none">0</span>`;
        btn.addEventListener("click", fbToggle);
        document.body.appendChild(btn);

        // Drop-up panel — built with DOM so no inline onclick issues
        const dup = document.createElement("div");
        dup.id = "fbDropup";

        const head = document.createElement("div");
        head.className = "fb-dup-head";
        const headTitle = document.createElement("span");
        headTitle.textContent = "Chats";
        const headClose = document.createElement("button");
        headClose.className = "fb-icon-btn";
        headClose.setAttribute("aria-label","Close");
        headClose.innerHTML = `<i class="ti ti-chevron-down" style="font-size:18px"></i>`;
        headClose.addEventListener("click", fbToggle);
        head.appendChild(headTitle);
        head.appendChild(headClose);

        const searchWrap = document.createElement("div");
        searchWrap.className = "fb-dup-search";
        const searchInput = document.createElement("input");
        searchInput.type = "text";
        searchInput.placeholder = "Search Messenger";
        searchInput.id = "fbSearch";
        searchInput.addEventListener("input", function(){ fbFilter(this.value); });
        searchWrap.appendChild(searchInput);

        const list = document.createElement("div");
        list.className = "fb-dup-list";
        list.id = "fbFriends";
        list.innerHTML = `<p class="fb-dup-empty">Loading…</p>`;

        dup.appendChild(head);
        dup.appendChild(searchWrap);
        dup.appendChild(list);
        document.body.appendChild(dup);

        // Windows tray
        const tray = document.createElement("div");
        tray.id = "fbWins";
        document.body.appendChild(tray);
    }

    // ── Toggle ─────────────────────────────────────────────────────────
    function fbToggle() {
        const d = document.getElementById("fbDropup");
        const open = d.style.display === "flex";
        d.style.display = open ? "none" : "flex";
        if (!open) fbLoadFriends();
    }

    // ── Friends ────────────────────────────────────────────────────────
    async function fbLoadFriends() {
        try {
            const [fr, ur] = await Promise.all([
                fetch("/messages/friends-list").then(r => r.json()),
                fetch("/messages/unread-per-friend").then(r => r.json()),
            ]);
            allFriends = fr; friends = fr; unreadCounts = ur;
        } catch(e) {
            console.error("[fbMessenger] loadFriends failed:", e);
        }
        fbRender(friends);
        fbBadge();
    }

    function fbFilter(q) {
        friends = allFriends.filter(f => f.username.toLowerCase().includes(q.toLowerCase()));
        fbRender(friends);
    }

    function fbRender(list) {
        const el = document.getElementById("fbFriends");
        if (!el) return;
        el.innerHTML = "";
        if (!list.length) {
            const p = document.createElement("p");
            p.className = "fb-dup-empty";
            p.textContent = "No friends found";
            el.appendChild(p);
            return;
        }
        list.forEach(function(f) {
            const btn = document.createElement("button");
            btn.className = "fb-frow";
            btn.type = "button";

            const picWrap = document.createElement("div");
            picWrap.className = "fb-frow-pic-wrap";
            const img = document.createElement("img");
            img.src = f.profile_pic || "";
            img.className = "fb-frow-pic";
            img.alt = f.username;
            picWrap.appendChild(img);
            if (f.online) {
                const dot = document.createElement("span");
                dot.className = "fb-frow-dot";
                picWrap.appendChild(dot);
            }

            const name = document.createElement("span");
            name.className = "fb-frow-name";
            name.textContent = f.username;

            btn.appendChild(picWrap);
            btn.appendChild(name);

            const n = unreadCounts[f.username] || 0;
            if (n) {
                const pill = document.createElement("span");
                pill.className = "fb-frow-pill";
                pill.textContent = n;
                btn.appendChild(pill);
            }

            // Capture values in closure — no inline onclick string
            (function(username, pic) {
                btn.addEventListener("click", function(e) {
                    e.stopPropagation();
                    fbOpen(username, pic);
                });
            })(f.username, f.profile_pic || "");

            el.appendChild(btn);
        });
    }

    // ── Open window ────────────────────────────────────────────────────
    async function fbOpen(username, pic) {
        document.getElementById("fbDropup").style.display = "none";

        if (openChats[username]) {
            const w = openChats[username].win;
            if (w.classList.contains("fb-minimized")) fbToggleMin(username);
            document.getElementById("fbi-" + username)?.focus();
            return;
        }

        const win = buildWin(username, pic);
        document.getElementById("fbWins").appendChild(win);
        openChats[username] = { win: win, pic: pic };

        socket.emit("join", { other: username });

        try {
            const hist = await fetch("/messages/" + encodeURIComponent(username)).then(r => r.json());
            hist.forEach(function(m, i) {
                const isLast = !hist[i+1] || hist[i+1].sender !== m.sender;
                appendMsg(username, m, false, isLast);
            });
        } catch(e) {
            console.error("[fbMessenger] history fetch failed:", e);
        }

        const body = document.getElementById("fbb-" + username);
        if (body) body.scrollTop = body.scrollHeight;

        if (unreadCounts[username]) {
            delete unreadCounts[username];
            fbRender(friends);
            fbBadge();
        }
        document.getElementById("fbi-" + username)?.focus();
    }

    function buildWin(username, pic) {
        const win = document.createElement("div");
        win.className = "fb-win";
        win.dataset.user = username;

        // Header
        const head = document.createElement("div");
        head.className = "fb-whead";
        head.addEventListener("click", function() { fbToggleMin(username); });

        const himg = document.createElement("img");
        himg.src = pic;
        himg.alt = username;

        const hlink = document.createElement("a");
        hlink.href = "/profile/" + encodeURIComponent(username);
        hlink.className = "fb-whead-name";
        hlink.textContent = username;
        hlink.addEventListener("click", function(e) { e.stopPropagation(); });

        const minBtn = document.createElement("button");
        minBtn.className = "fb-whead-btn";
        minBtn.setAttribute("aria-label","Minimise");
        minBtn.innerHTML = `<i class="ti ti-minus" style="font-size:14px"></i>`;
        minBtn.addEventListener("click", function(e) { e.stopPropagation(); fbToggleMin(username); });

        const closeBtn = document.createElement("button");
        closeBtn.className = "fb-whead-btn";
        closeBtn.setAttribute("aria-label","Close");
        closeBtn.innerHTML = `<i class="ti ti-x" style="font-size:14px"></i>`;
        closeBtn.addEventListener("click", function(e) { e.stopPropagation(); fbClose(username); });

        head.appendChild(himg);
        head.appendChild(hlink);
        head.appendChild(minBtn);
        head.appendChild(closeBtn);

        // Body
        const body = document.createElement("div");
        body.className = "fb-wbody";
        body.id = "fbb-" + username;

        // Footer
        const foot = document.createElement("div");
        foot.className = "fb-wfoot";
        foot.id = "fbf-" + username;

        const inp = document.createElement("input");
        inp.className = "fb-winput";
        inp.id = "fbi-" + username;
        inp.placeholder = "Aa";
        inp.maxLength = 1000;
        inp.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); fbSend(username); }
        });

        const sendBtn = document.createElement("button");
        sendBtn.className = "fb-wsend";
        sendBtn.setAttribute("aria-label","Send");
        sendBtn.innerHTML = `<i class="ti ti-send" style="font-size:17px"></i>`;
        sendBtn.addEventListener("click", function() { fbSend(username); });

        foot.appendChild(inp);
        foot.appendChild(sendBtn);

        win.appendChild(head);
        win.appendChild(body);
        win.appendChild(foot);
        return win;
    }

    function fbToggleMin(username) {
        const chat = openChats[username];
        if (!chat) return;
        const isMin = chat.win.classList.contains("fb-minimized");
        chat.win.classList.toggle("fb-minimized", !isMin);
        const body = document.getElementById("fbb-" + username);
        const foot = document.getElementById("fbf-" + username);
        if (body) body.style.display = isMin ? "" : "none";
        if (foot) foot.style.display = isMin ? "" : "none";
        if (isMin) document.getElementById("fbi-" + username)?.focus();
    }

    function fbClose(username) {
        const chat = openChats[username];
        if (chat) { chat.win.remove(); delete openChats[username]; }
    }

    function fbSend(username) {
        const inp = document.getElementById("fbi-" + username);
        if (!inp) return;
        const content = inp.value.trim();
        if (!content) return;
        inp.value = "";
        socket.emit("send_message", { recipient: username, content: content });
    }

    // ── Socket ─────────────────────────────────────────────────────────
    socket.on("new_message", function(msg) {
        const other = msg.sender === ME ? msg.recipient : msg.sender;
        if (openChats[other]) {
            appendMsg(other, msg, true, true);
            if (msg.sender !== ME) {
                delete unreadCounts[other];
                fbRender(friends);
                fbBadge();
                fetch("/messages/" + encodeURIComponent(other));
            }
        } else if (msg.sender !== ME) {
            unreadCounts[msg.sender] = (unreadCounts[msg.sender] || 0) + 1;
            fbRender(friends);
            fbBadge();
            const l = document.getElementById("fbLaunch");
            if (l) { l.classList.add("fb-pulse"); setTimeout(function(){ l.classList.remove("fb-pulse"); }, 450); }
        }
    });

    function appendMsg(chatUser, msg, scroll, showPic) {
        const body = document.getElementById("fbb-" + chatUser);
        if (!body) return;
        const mine = msg.sender === ME;
        const chat = openChats[chatUser];

        const row = document.createElement("div");
        row.className = "fb-row" + (mine ? " fb-row-mine" : "");

        if (!mine) {
            const rimg = document.createElement("img");
            rimg.src = (chat && chat.pic) ? chat.pic : "";
            rimg.className = "fb-row-pic" + (showPic ? "" : " fb-pic-hidden");
            rimg.alt = chatUser;
            row.appendChild(rimg);
        }

        const col = document.createElement("div");
        col.className = "fb-col";

        const bubble = document.createElement("div");
        bubble.className = "fb-bubble " + (mine ? "fb-bubble-mine" : "fb-bubble-theirs");
        bubble.textContent = msg.content;
        col.appendChild(bubble);

        if (showPic && msg.created_at) {
            const t = document.createElement("div");
            t.className = "fb-msg-time";
            t.textContent = msg.created_at;
            col.appendChild(t);
        }

        row.appendChild(col);
        body.appendChild(row);
        if (scroll) body.scrollTop = body.scrollHeight;
    }

    // ── Badge ──────────────────────────────────────────────────────────
    function fbBadge() {
        const total = Object.values(unreadCounts).reduce(function(a,b){ return a+b; }, 0);
        const badge = document.getElementById("fbBadge");
        if (!badge) return;
        badge.textContent = total;
        badge.style.display = total > 0 ? "flex" : "none";
    }

    // ── Boot ───────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", function() {
        injectUI();
        fbLoadFriends();
        setInterval(function() {
            fetch("/messages/unread-per-friend").then(function(r){ return r.json(); }).then(function(d){
                unreadCounts = d; fbRender(friends); fbBadge();
            }).catch(function(){});
        }, 20000);
    });
})();
</script>
{% endif %}
