{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4 card p-4 shadow" style="background-color: var(--card); border-top: 5px solid var(--neon);">
        <h2 class="text-center mb-4" style="color: var(--neon);">Login to Sahabat</h2>
        
        <form method="POST">
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="1234567@student.mmu.edu.my" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-neon w-100 rounded-pill">Login</button>
            
            <p class="text-center mt-4 mb-0">
                <a href="{{ url_for('register') }}" class="text-muted text-decoration-none small">Don't have an account? Register here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
