<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMU Social</title>
<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}

/* Top Bar */
.topbar {
    background: #333;
    color: white;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.nav button {
    margin: 0 5px;
    padding: 8px;
    cursor: pointer;
}

.search input {
    padding: 6px;
}

/* Dropdown */
.dropdown {
    position: relative;
    display: inline-block;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: white;
    right: 0;
    min-width: 120px;
}

.dropdown-content a {
    display: block;
    padding: 10px;
    text-decoration: none;
    color: black;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* Pages */
.page {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* Post */
.post {
    background: white;
    padding: 15px;
    margin: 10px 0;
}

.post img {
    max-width: 100%;
}

/* Suggested Friends */
.suggested {
    background: white;
    padding: 10px;
    margin: 10px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="nav">
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('club')">Club</button>
        <button onclick="showPage('friends')">Friends</button>
    </div>

    <div class="search">
        <input type="text" placeholder="Search...">
    </div>

    <div class="dropdown">
        <button>☰</button>
        <div class="dropdown-content">
            <a href="#">Profile</a>
            <a href="#">Settings</a>
            <a href="#">Log Out</a>
        </div>
    </div>
</div>

<!-- SUGGESTED FRIENDS -->
<div class="suggested">
    <h3>Suggested Friends</h3>
    <p>Ali (Same Intake)</p>
    <p>John (Gaming Club)</p>
    <p>Sara (Same Interests)</p>
</div>

<!-- HOME PAGE -->
<div id="home" class="page active">
    <h2>Home (Hot Posts)</h2>

    <div class="post">
        <p><b>Matthias:</b> Just finished exams 🎉</p>
        <img src="Sahabat MMU\pics\grad_photo.jpg" alt="Graduation Photo">
        <br><button>Like</button> <button>Comment</button>
    </div>

</div>

<!-- CLUB PAGE -->
<div id="club" class="page">
    <h2>Club Posts</h2>

    <div class="post">
        <p><b>Photography Club:</b> Join our event this Friday!</p>
        <button>Like</button> <button>Comment</button>
    </div>

</div>

<!-- FRIENDS PAGE -->
<div id="friends" class="page">
    <h2>Friends Feed</h2>

    <div class="post">
        <p><b>Janice:</b> Had a great day today ❤️</p>
        <button>Like</button> <button>Comment</button>
    </div>

</div>

<script>
function showPage(pageId) {
    let pages = document.querySelectorAll(".page");
    pages.forEach(p => p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}
</script>

</body>
</html>
