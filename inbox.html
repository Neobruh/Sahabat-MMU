{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <h2 class="mb-4" style="color: var(--neon);">Active Conversations</h2>
        <div class="card" style="background: var(--card); border: 1px solid #2a203b; border-radius: 12px;">
            <div class="list-group list-group-flush">
                
                {% for user in users %}
                <a href="{{ url_for('chat', user_id=user.id) }}" class="list-group-item list-group-item-action d-flex align-items-center p-3" style="background: transparent; border-bottom: 1px solid #2a203b;">
                    <div class="thumbnail me-3">{{ user.username[0] | upper }}</div>
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="mb-0 text-light fw-bold">{{ user.username }}</h6>
                            <small class="text-muted">{{ user.campus }}</small>
                        </div>
                        <p class="mb-0 text-secondary small text-truncate" style="max-width: 80%;">Tap to chat with {{ user.username }}...</p>
                    </div>
                </a>
                {% endfor %}

            </div>
        </div>
    </div>
</div>
{% endblock %}
