<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahabat MMU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --neon: #b026ff; --bg: #0d0914; --card: #1a1525; }
        body { background-color: var(--bg); color: #e0e0e0; font-family: sans-serif; }
        .btn-neon { background: var(--neon); color: white; border: none; font-weight: bold; }
        .btn-neon:hover { box-shadow: 0 0 15px var(--neon); color: white; }
        .profile-card { background: var(--card); border: 1px solid #2a203b; border-radius: 12px; transition: 0.3s; }
        .profile-card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .form-control, .form-select { background: #000; border: 1px solid #333; color: white; }
        .form-control:focus { background: #111; color: white; border-color: var(--neon); box-shadow: none; }
        
        /* Navbar */
        .navbar-custom { background-color: var(--card); border-bottom: 2px solid var(--neon); }
        
        /* Chat Styles */
        .chat-container { height: 60vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; }
        .msg-sent { background-color: var(--neon); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-received { background-color: #2a203b; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-input-area { background: var(--card); border-top: 1px solid #2a203b; padding: 15px; }
        .thumbnail { width: 45px; height: 45px; border-radius: 50%; background: #2a203b; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--neon); }
    </style>
</head>
<body>
    {% if current_user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" style="color: var(--neon);" href="{{ url_for('discovery') }}">Sahabat MMU</a>
            <div class="d-flex gap-3">
                <a href="{{ url_for('discovery') }}" class="btn btn-outline-light rounded-pill">Discovery</a>
                <a href="{{ url_for('inbox') }}" class="btn btn-outline-light rounded-pill">Inbox</a>
                <a href="{{ url_for('logout') }}" class="btn btn-danger rounded-pill">Logout</a>
            </div>
        </div>
    </nav>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} m-0 rounded-0 text-center">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
