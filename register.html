{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="col-md-4 card p-4 shadow" style="background-color: var(--card); border-top: 5px solid var(--neon);">
        <h2 class="text-center mb-4" style="color: var(--neon);">Join Sahabat MMU</h2>
        <form method="POST">
            <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
            <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="1234567@student.mmu.edu.my" required></div>
            <div class="mb-3">
                <select name="major" class="form-select">
                    <option value="Creative Multimedia">Creative Multimedia</option>
                    <option value="Computer Science">Computer Science</option>
                </select>
            </div>
            <div class="mb-3">
                <select name="campus" class="form-select">
                    <option value="Cyberjaya">Cyberjaya</option>
                    <option value="Melaka">Melaka</option>
                </select>
            </div>
            <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
            <button type="submit" class="btn btn-neon w-100 rounded-pill">Create Account</button>
            <p class="text-center mt-3"><a href="{{ url_for('login') }}" class="text-muted text-decoration-none small">Already have an account? Login</a></p>
        </form>
    </div>
</div>
{% endblock %}
